<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Scorecard | SATPL 2026</title>

    <!-- DNS Pre-connect for Supabase (Speeds up connection on mobile ISPs) -->
    <link rel="dns-prefetch" href="https://lsikcaybolgsfimwtkdv.supabase.co">
    <link rel="preconnect" href="https://lsikcaybolgsfimwtkdv.supabase.co" crossorigin>

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-main: 'Outfit', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-dark);
            color: white;
            margin: 0;
        }

        .scorecard-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 20px;
        }

        .match-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .live-score-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .live-score-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--secondary);
        }

        .score-main {
            font-size: 4rem;
            font-weight: 900;
            margin: 20px 0;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 10px;
        }

        .wickets {
            color: var(--secondary);
        }

        .overs {
            font-size: 1.2rem;
            color: var(--text-dim);
            font-weight: 400;
        }

        .teams-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .team-name {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .vs-tag {
            background: var(--secondary);
            color: var(--bg-dark);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.8rem;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            overflow: hidden;
        }

        .stats-table th {
            background: rgba(255, 255, 255, 0.05);
            text-align: left;
            padding: 15px;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .on-strike {
            color: var(--secondary);
        }

        .on-strike::after {
            content: '*';
            margin-left: 5px;
        }

        .timeline {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 25px;
        }

        .ball {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.1);
        }

        .ball.boundary {
            background: var(--secondary);
            color: var(--bg-dark);
        }

        .ball.six {
            background: var(--primary);
            color: white;
        }

        .ball.wicket {
            background: #ef4444;
            color: white;
        }

        .match-status {
            margin-top: 20px;
            color: var(--secondary);
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* Result Card Styles */
        .result-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--secondary);
            transform: translateY(-3px);
        }

        .res-team {
            font-weight: 800;
            font-size: 1.1rem;
        }

        .res-score {
            color: var(--secondary);
            font-weight: 900;
            margin-left: 10px;
        }

        .res-vs {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin: 0 15px;
        }

        /* ---- SCORECARD MOBILE FIXES ---- */
        @media (max-width: 768px) {
            .scorecard-container { margin: 90px 12px 30px !important; padding: 12px !important; }
            .live-score-box { padding: 20px !important; }
            .score-main { font-size: 2.5rem !important; }
            .teams-display { flex-direction: column !important; gap: 8px !important; align-items: center !important; }
            .team-name { font-size: 1.1rem !important; }
            .stats-table th, .stats-table td { padding: 10px 8px !important; font-size: 0.78rem !important; }
            .timeline { flex-wrap: wrap !important; gap: 8px !important; }
            .result-card { flex-direction: column !important; gap: 8px !important; text-align: center !important; }
        }
        @media (max-width: 480px) {
            .score-main { font-size: 2rem !important; }
            .stats-table th { font-size: 0.68rem !important; }
            .stats-table td { font-size: 0.72rem !important; }
            .ball { width: 28px; height: 28px; font-size: 0.75rem; }
        }

        .res-winner-tag {
            background: rgba(0, 242, 255, 0.1);
            color: var(--secondary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        @keyframes bounce-in {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body class="preloader-active">
    <div id="preloader">
        <div class="preloader-logo">SATPL SCORECARD</div>
        <div class="preloader-bar"></div>
    </div>

    <div id="particles-bg"></div>

    <nav class="navbar animate-fade">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="img.svg" alt="SATPL Logo" style="height: 50px; width: auto;">
                <h1 class="gradient-text" style="font-size: 1.8rem; margin: 0;">SATPL 2026</h1>
            </div>
            <div class="nav-links" id="dynamic-navbar"></div>
        </div>
    </nav>

    <div class="scorecard-container animate-fade">
        <div class="match-header">
            <span class="badge" id="match-badge">LIVE MATCH</span>
            <h2 id="match-title" style="margin-top: 10px;">Sonaijuri Anchal Tennis Premier League</h2>
            <button onclick="downloadMatchReport()" class="btn-scoring"
                style="margin-top: 15px; background: var(--secondary); color: var(--bg-dark); border: none; font-size: 0.85rem; padding: 10px 20px;">
                📸 Download Match Report
            </button>
        </div>

        <div class="live-score-box glass">
            <div class="teams-display">
                <div style="text-align: left; flex: 1;">
                    <div class="team-name" id="team1-name">Loading...</div>
                    <div style="font-size: 2rem; font-weight: 900; color: var(--secondary);" id="t1-detailed-score">0/0
                    </div>
                    <div style="font-size: 0.9rem; color: var(--text-dim);" id="t1-detailed-overs">(0.0)</div>
                </div>
                <div class="vs-tag">VS</div>
                <div style="text-align: right; flex: 1;">
                    <div class="team-name" id="team2-name">Loading...</div>
                    <div style="font-size: 2rem; font-weight: 900; color: var(--secondary);" id="t2-detailed-score">0/0
                    </div>
                    <div style="font-size: 0.9rem; color: var(--text-dim);" id="t2-detailed-overs">(0.0)</div>
                </div>
            </div>

            <div id="match-status" class="match-status">Connecting to live feed...</div>

            <div id="extra-info" style="margin-top: 15px; font-size: 0.9rem; color: #ffeb3b; font-weight: 600;"></div>

            <div class="timeline" id="ball-timeline" style="margin-top: 20px;">
                <!-- Balls will appear here -->
            </div>
        </div>

        <table class="stats-table">
            <thead>
                <tr>
                    <th>Batter</th>
                    <th>R</th>
                    <th>B</th>
                    <th>4s</th>
                    <th>6s</th>
                    <th>SR</th>
                </tr>
            </thead>
            <tbody id="batting-stats">
                <!-- Batting details -->
            </tbody>
        </table>

        <table class="stats-table" style="margin-top: 20px;">
            <thead>
                <tr>
                    <th>Bowler</th>
                    <th>O</th>
                    <th>M</th>
                    <th>R</th>
                    <th>W</th>
                    <th>ECO</th>
                </tr>
            </thead>
            <tbody id="bowling-stats">
                <!-- Bowling details -->
            </tbody>
        </table>

        <!-- Recent Results Section -->
        <div style="margin-top: 60px;">
            <h3 class="gradient-text" style="text-align: center; margin-bottom: 25px; font-size: 1.8rem;">Recent Match
                Results</h3>
            <div id="recent-results-list" style="display: grid; gap: 20px;">
                <!-- Recent matches will be loaded here -->
                <div
                    style="text-align: center; color: var(--text-dim); padding: 40px; background: rgba(255,255,255,0.02); border-radius: 15px; border: 1px dashed rgba(255,255,255,0.1);">
                    Fetching past results...
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="supabase-config.js"></script>
    <script src="nav-loader.js"></script>
    <script>
        // Bulletproof Polling Fallback (Runs every 10 seconds)
        let fallbackInterval;

        async function loadLiveScore() {
            try {
                const { data, error } = await supabaseClient
                    .from('hero_content')
                    .select('*')
                    .eq('id', '00000000-0000-0000-0000-000000000001')
                    .single();

                if (error || !data) return;

                showLiveSyncIndicator();

                document.getElementById('team1-name').innerText = data.team1_name;
                document.getElementById('team2-name').innerText = data.team2_name;

                // Team 1 Display
                document.getElementById('t1-detailed-score').innerText = `${data.team1_score || 0}/${data.wickets || 0}`;
                document.getElementById('t1-detailed-overs').innerText = `(${data.overs || 0}.${data.balls || 0} Overs)`;

                // Team 2 Display (If any)
                document.getElementById('t2-detailed-score').innerText = `${data.team2_score || 0}/${data.team2_wickets || 0}`;
                document.getElementById('t2-detailed-overs').innerText = `(${data.team2_overs || 0}.${data.team2_balls || 0} Overs)`;

                const statusEl = document.getElementById('match-status');
                if (data.badge === 'RESULT') {
                    statusEl.innerHTML = '🏆 ' + (data.match_status || 'Match Completed') + ' 🏆';
                    statusEl.style.cssText = 'margin-top: 20px; font-size: 1.5rem; color: #00ffa2; background: rgba(0, 255, 162, 0.1); padding: 15px; border-radius: 12px; border: 1px solid #00ffa2; text-transform: uppercase; letter-spacing: 1px; animation: bounce-in 0.5s ease-out;';
                } else {
                    statusEl.innerText = data.match_status || "";
                    statusEl.style.cssText = 'margin-top: 20px; color: var(--secondary); font-weight: 700; font-size: 1.1rem;';
                }

                document.getElementById('match-badge').innerText = data.badge || "LIVE MATCH";

                // Extra Info (Target/RRR)
                const extra = document.getElementById('extra-info');
                if (data.target > 0) {
                    const runsNeeded = data.target - data.team1_score; // Assuming Team 1 is chasing
                    extra.innerText = runsNeeded > 0 ? `Target: ${data.target} | ${runsNeeded} runs more to win` : `Target Achieved!`;
                } else {
                    extra.innerText = "";
                }

                // Batting Stats
                const batBody = document.getElementById('batting-stats');
                const b1_sr = data.batsman1_balls > 0 ? ((data.batsman1_runs / data.batsman1_balls) * 100).toFixed(1) : "0.0";
                const b2_sr = data.batsman2_balls > 0 ? ((data.batsman2_runs / data.batsman2_balls) * 100).toFixed(1) : "0.0";

                batBody.innerHTML = `
                    <tr>
                        <td class="${data.striker_idx == 1 ? 'on-strike' : ''}">${data.batsman1 || '---'}</td>
                        <td>${data.batsman1_runs || 0}</td>
                        <td>${data.batsman1_balls || 0}</td>
                        <td>${data.batsman1_4s || 0}</td>
                        <td>${data.batsman1_6s || 0}</td>
                        <td>${b1_sr}</td>
                    </tr>
                    <tr>
                        <td class="${data.striker_idx == 2 ? 'on-strike' : ''}">${data.batsman2 || '---'}</td>
                        <td>${data.batsman2_runs || 0}</td>
                        <td>${data.batsman2_balls || 0}</td>
                        <td>${data.batsman2_4s || 0}</td>
                        <td>${data.batsman2_6s || 0}</td>
                        <td>${b2_sr}</td>
                    </tr>
                `;

                // Bowling Stats
                const bowlBody = document.getElementById('bowling-stats');
                const eco = data.bowler_overs > 0 ? (data.bowler_runs / data.bowler_overs).toFixed(1) : "0.0";
                bowlBody.innerHTML = `
                    <tr>
                        <td>${data.bowler_name || '---'}</td>
                        <td>${data.bowler_overs || 0}</td>
                        <td>${data.bowler_maidens || 0}</td>
                        <td>${data.bowler_runs || 0}</td>
                        <td>${data.bowler_wickets || 0}</td>
                        <td>${eco}</td>
                    </tr>
                `;

                // Timeline
                const timeline = document.getElementById('ball-timeline');
                if (data.recent_balls) {
                    const balls = data.recent_balls.split(',');
                    timeline.innerHTML = balls.map(b => {
                        let cls = 'ball';
                        if (b == '4') cls += ' boundary';
                        if (b == '6') cls += ' six';
                        if (b.toLowerCase().includes('w')) cls += ' wicket';
                        return `<div class="${cls}">${b}</div>`;
                    }).join('');
                }
            } catch (err) {
                console.error("Error loading scorecard:", err);
            }
        }

        function showLiveSyncIndicator() {
            let indicator = document.getElementById('live-sync-indicator');
            if (!indicator) {
                indicator = document.createElement('div');
                indicator.id = 'live-sync-indicator';
                indicator.style.cssText = 'position:fixed; bottom:20px; right:20px; background:rgba(0,255,150,0.15); color:#00ffa2; padding:8px 15px; border-radius:30px; font-size:12px; font-weight:bold; border:1px solid rgba(0,255,150,0.3); z-index:9999; display:flex; align-items:center; gap:8px; backdrop-filter:blur(10px); animation: fade-pulse 2s infinite;';
                indicator.innerHTML = '<span style="width:8px; height:8px; background:#00ffa2; border-radius:50%; box-shadow:0 0 10px #00ffa2;"></span> LIVE SYNCING';
                document.body.appendChild(indicator);
                
                const style = document.createElement('style');
                style.textContent = `@keyframes fade-pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }`;
                document.head.appendChild(style);
            }
            indicator.style.display = 'flex';
            setTimeout(() => { if(indicator) indicator.style.display = 'none'; }, 2000);
        }

        async function fetchRecentResults() {
            try {
                const { data, error } = await supabaseClient
                    .from('fixtures')
                    .select('*')
                    .eq('status', 'completed')
                    .order('match_no', { ascending: false })
                    .limit(5);

                if (error) return;
                const list = document.getElementById('recent-results-list');
                if (data.length === 0) {
                    list.innerHTML = `<div style="text-align: center; color: var(--text-dim); padding: 40px;">No completed matches yet.</div>`;
                    return;
                }

                list.innerHTML = data.map(f => `
                    <div class="result-card">
                        <div>
                            <div style="color: var(--text-dim); font-size: 0.7rem; margin-bottom: 5px;">MATCH #${f.match_no} • ${f.match_date}</div>
                            <div style="display: flex; align-items: center;">
                                <span class="res-team">${f.team1}</span>
                                <span class="res-score">${f.t1_score}/${f.t1_wickets || 0}</span>
                                <span class="res-vs">VS</span>
                                <span class="res-team">${f.team2}</span>
                                <span class="res-score">${f.t2_score}/${f.t2_wickets || 0}</span>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div class="res-winner-tag">${f.winner === 'Draw' ? 'No Result' : f.winner + ' WON'}</div>
                            <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: 5px;">${f.venue}</div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error fetching results:", err);
            }
        }

        // Initialize Real-time & Polling
        function setupSync() {
            try {
                // Supabase Subscription
                supabaseClient
                    .channel('scorecard-realtime')
                    .on('postgres_changes', { 
                        event: 'UPDATE', 
                        schema: 'public', 
                        table: 'hero_content',
                        filter: 'id=eq.00000000-0000-0000-0000-000000000001' 
                    }, loadLiveScore)
                    .subscribe();

                // Polling Fallback (10 seconds)
                if (fallbackInterval) clearInterval(fallbackInterval);
                fallbackInterval = setInterval(loadLiveScore, 10000);
                
                console.log("Real-time sync & fallback polling initialized.");
            } catch (e) {
                console.warn("Sync setup failed, using polling only:", e);
                if (fallbackInterval) clearInterval(fallbackInterval);
                fallbackInterval = setInterval(loadLiveScore, 10000);
            }
        }

        async function downloadMatchReport() {
            const btn = event.currentTarget;
            btn.innerText = "Generating...";
            btn.disabled = true;

            const element = document.querySelector('.scorecard-container');

            // Clean up UI for report
            const nav = document.querySelector('.navbar');
            const results = document.getElementById('recent-results-list').parentElement;
            if (nav) nav.style.display = 'none';
            if (results) results.style.display = 'none';

            try {
                const canvas = await html2canvas(element, {
                    backgroundColor: '#050816',
                    scale: 2, // High resolution
                    logging: false,
                    useCORS: true
                });

                const link = document.createElement('a');
                link.download = `SATPL_Match_Report_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (e) {
                console.error("Report generation failed:", e);
                alert("Failed to generate report. Please try again.");
            } finally {
                if (nav) nav.style.display = 'block';
                if (results) results.style.display = 'block';
                btn.innerText = "📸 Download Match Report";
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadLiveScore();
            fetchRecentResults();
            setupSync();
        });
    </script>
</body>

</html>
