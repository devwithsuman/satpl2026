<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script>
        // --- PROFESSIONAL CONSOLE FILTER ---
        // Hide harmless library warnings (Babel, Tailwind, Source Maps)
        (function () {
            const originalWarn = console.warn;
            const originalError = console.error;
            console.warn = (...args) => {
                const msg = args[0] && typeof args[0] === 'string' ? args[0] : "";
                if (msg.includes('Babel') || msg.includes('tailwindcss') || msg.includes('cdn.tailwindcss.com') || msg.includes('source map')) return;
                originalWarn.apply(console, args);
            };
            console.error = (...args) => {
                const msg = args[0] && typeof args[0] === 'string' ? args[0] : "";
                if (msg.includes('source map') || msg.includes('SourceMap') || msg.includes('cdn.tailwindcss.com')) return;
                originalError.apply(console, args);
            };
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Pro Scorecard Admin | SATPL 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00f2ff',
                        secondary: '#e0007b',
                        dark: '#0d1117',
                        'dark-card': '#161b22',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0d1117;
            color: #fff;
        }

        .glass {
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .premium-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-btn:active {
            transform: scale(0.95);
        }

        .neon-border {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Mobile Overrides */
        @media (max-width: 640px) {
            .glass { padding: 1.25rem !important; }
            .text-6xl { font-size: 3rem !important; line-height: 1; }
            .text-3xl { font-size: 1.75rem !important; }
            .p-8 { padding: 1rem !important; }
            .h-20 { height: 4rem !important; width: 4rem !important; }
            .h-16 { height: 3.5rem !important; }
            .modal-content { max-height: 95vh !important; }
        }
    </style>
</head>

<body class="min-h-screen">
    <div id="root"></div>

    <!-- Scripts (Professional Local Setup - No Source Map Warnings) -->
    <script src="react.min.js"></script>
    <script src="react-dom.min.js"></script>
    <script src="babel.min.js"></script>
    <script src="supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const DEFAULT_MATCH_STATE = {
            runs: 0, wkts: 0, overs: 0, balls: 0,
            batsman1: { name: 'Select Striker', runs: 0, balls: 0, reg: null },
            batsman2: { name: 'Select Non-Striker', runs: 0, balls: 0, reg: null },
            bowler: { name: 'Select Bowler', runs: 0, wkts: 0, overs: 0, balls: 0, reg: null },
            striker: 1, history: [], timeline: [],
            inning: 1, target: null,
            overLimit: 6, wicketLimit: null,
            tossWinner: null, tossChoice: null,
            fow1: [], fow2: [],
            battingStats: {},
            bowlingStats: {}
        };

        // --- COMPONENTS ---
        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
            const variants = {
                primary: 'bg-primary text-black hover:bg-opacity-90 shadow-lg shadow-cyan-500/20',
                secondary: 'bg-secondary text-white hover:bg-opacity-90',
                outline: 'border border-white/10 hover:bg-white/5 text-white',
                danger: 'bg-red-500/10 text-red-500 border border-red-500/20 hover:bg-red-500/20',
            };
            return (
                <button
                    onClick={onClick}
                    disabled={disabled}
                    className={`premium-btn px-6 py-2.5 rounded-xl font-bold text-sm uppercase tracking-wider ${variants[variant]} ${className} ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`}
                >
                    {children}
                </button>
            );
        };

        const Card = ({ children, title, subtitle, className = "" }) => (
            <div className={`glass p-6 rounded-2xl animate-fade ${className}`}>
                {(title || subtitle) && (
                    <div className="mb-6">
                        {title && <h3 className="text-xl font-extrabold text-white tracking-tight">{title}</h3>}
                        {subtitle && <p className="text-gray-400 text-sm">{subtitle}</p>}
                    </div>
                )}
                {children}
            </div>
        );

        // --- MAIN APP ---
        function App() {
            const [session, setSession] = useState(() => {
                try {
                    const saved = localStorage.getItem('satpl_scorer_session');
                    return saved ? JSON.parse(saved) : null;
                } catch (e) { return null; }
            });
            const [fixtures, setFixtures] = useState([]);
            const [selectedMatch, setSelectedMatch] = useState(null);
            const [isLive, setIsLive] = useState(false);
            const [matchState, setMatchState] = useState(DEFAULT_MATCH_STATE);
            const [teamPlayers, setTeamPlayers] = useState([]);
            const [teamMap, setTeamMap] = useState({});
            const [showPlayerModal, setShowPlayerModal] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [showTossModal, setShowTossModal] = useState(false);
            const [showScorecardModal, setShowScorecardModal] = useState(false); 
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [showExitConfirm, setShowExitConfirm] = useState(false); 
            const [showResumeModal, setShowResumeModal] = useState(false); // NEW: Resume Flow
            const [matchToResume, setMatchToResume] = useState(null); // NEW

            useEffect(() => {
                fetchFixtures();

                // Professional Global Error Handlers (Hardened for file:// protocol)
                window.onerror = (msg, url, lineNo, columnNo, error) => {
                    const lowMsg = (msg || "").toLowerCase();
                    const lowUrl = (url || "").toLowerCase();
                    
                    // Silent Filter: Ignore CORS noise, Tailwind, and Babel errors
                    if (
                        lowMsg.includes("script error") || 
                        lowUrl.includes("tailwindcss") || 
                        lowUrl.includes("babel") ||
                        (lowMsg.includes("is not defined") && (lowUrl === "" || lowUrl.includes("tailwindcss")))
                    ) {
                        console.warn("Filtered Script Noise:", { msg, url });
                        return true; // STOP Propagation
                    }
                    
                    console.error("Critical Admin Error:", { msg, url, lineNo, error });
                    // Only alert for REAL source-mapped errors (if lineNo > 0)
                    if (lineNo > 0) {
                        alert(`Admin Portal System Alert\n\nMsg: ${msg}\nLine: ${lineNo}\n\n(Reporting to developer...)`);
                    }
                    return true; 
                };
                
                window.onunhandledrejection = (event) => {
                    console.warn("Async Promise Rejection:", event.reason);
                    if (event.reason?.message?.includes('network')) {
                        debugLog("Connection unstable...", "#ffb300");
                    }
                };
            }, []);

            // NEW: Auto-save match state to LocalStorage
            useEffect(() => {
                if (isLive && selectedMatch) {
                    const saveKey = `satpl_match_state_${selectedMatch.id}`;
                    localStorage.setItem(saveKey, JSON.stringify(matchState));
                }
            }, [matchState, isLive, selectedMatch]);

            const fetchFixtures = async () => {
                const { data } = await supabaseClient.from('fixtures').select('*').order('match_no', { ascending: true });
                setFixtures(data || []);
            };

            const selectMatch = async (match) => {
                setMatchToResume(match);
                
                // Fetch Team IDs & Data (Always do this for either path)
                const { data: teams } = await supabaseClient.from('points_table').select('*');
                const mapping = {};
                teams?.forEach(t => {
                    const name = (t.team_name || "").trim().toUpperCase();
                    mapping[name] = t.id;
                    if (name.includes('JIANT')) mapping[name.replace('JIANT', 'GIANT')] = t.id;
                    if (name.includes('GIANT')) mapping[name.replace('GIANT', 'JIANT')] = t.id;
                });
                setTeamMap(mapping);

                if (teams) {
                    const { data: players } = await supabaseClient
                        .from('team_players')
                        .select('team_id, reg_no, player_name')
                        .in('team_id', teams.map(t => t.id));
                    setTeamPlayers(players || []);
                }

                // Check for existing progress
                if (match.status !== 'upcoming' || (match.t1_score > 0 || match.t2_score > 0)) {
                    setShowResumeModal(true);
                } else {
                    setSelectedMatch(match);
                    setShowTossModal(true);
                }
            };

            async function handleResume() {
                const match = matchToResume;
                const saveKey = `satpl_match_state_${match.id}`;
                const localSaved = localStorage.getItem(saveKey);

                if (localSaved) {
                    try {
                        let parsed = JSON.parse(localSaved);
                        
                        // DATA MIGRATION: Convert legacy strings to objects
                        if (typeof parsed.batsman1 === 'string') parsed.batsman1 = { name: parsed.batsman1, runs: 0, balls: 0, reg: null };
                        if (typeof parsed.batsman2 === 'string') parsed.batsman2 = { name: parsed.batsman2, runs: 0, balls: 0, reg: null };
                        if (typeof parsed.bowler === 'string') parsed.bowler = { name: parsed.bowler, runs: 0, wkts: 0, overs: 0, balls: 0, reg: null };
                        
                        // ROBUST MERGE: Ensure all keys (history, timeline, stats) exist
                        setMatchState({ ...DEFAULT_MATCH_STATE, ...parsed });
                        setSelectedMatch(match);
                        setIsLive(true);
                        setShowResumeModal(false);
                        debugLog("Resumed & Migrated 💾", "#00f2ff");
                        return;
                    } catch (e) { console.error("Local resume failed:", e); }
                }

                // Fallback: Fetch from DB (hero_content)
                debugLog("Fetching from database... ☁️", "#ffb300");
                const { data: hero } = await supabaseClient.from('hero_content').select('*').eq('id', '00000000-0000-0000-0000-000000000001').single();
                
                if (hero) {
                    // Best effort reconstruction
                    setMatchState(prev => ({
                        ...prev,
                        runs: (hero.team1_score || 0) + (hero.team2_score || 0), // Basic guess
                        wkts: (hero.wickets || 0) + (hero.team2_wickets || 0),
                        overs: hero.team2_overs || hero.overs || 0,
                        balls: hero.team2_balls || hero.balls || 0,
                        batsman1: { name: hero.batsman1 || 'Select Striker', runs: hero.batsman1_runs || 0, balls: hero.batsman1_balls || 0, reg: hero.batsman1_reg },
                        batsman2: { name: hero.batsman2 || 'Select Non-Striker', runs: hero.batsman2_runs || 0, balls: hero.batsman2_balls || 0, reg: hero.batsman2_reg },
                        bowler: { name: hero.bowler_name || 'Select Bowler', runs: hero.bowler_runs || 0, wkts: hero.bowler_wickets || 0, overs: hero.bowler_overs || 0, balls: hero.bowler_over_balls || 0, reg: hero.bowler_reg },
                        striker: hero.striker_idx || 1,
                        timeline: (hero.recent_balls || "").split(',').filter(x => x),
                        overLimit: hero.max_overs || 6,
                        wicketLimit: hero.max_wickets || null,
                        inning: (hero.target ? 2 : 1),
                        target: hero.target || null
                    }));
                }

                setSelectedMatch(match);
                setIsLive(true);
                setShowResumeModal(false);
                debugLog("Resumed from database ✅", "#00f2ff");
            };

            async function handleStartFresh() {
                const match = matchToResume;
                setSelectedMatch(match);
                setShowResumeModal(false);
                
                // Call our robust reset
                await resetMatch();
                
                // Then show toss
                setShowTossModal(true);
            };

            async function startMatch() {
                setShowTossModal(false);
                setIsLive(true);
                // Trigger an immediate sync to set status to 'live'
                await syncToDB(matchState);
            };

            const getInningTeams = useCallback(() => {
                if (!selectedMatch || !matchState.tossWinner) return {};

                const team1 = selectedMatch.team1;
                const team2 = selectedMatch.team2;
                const tossWinner = matchState.tossWinner;
                const choice = matchState.tossChoice;

                let battingTeam, bowlingTeam;

                if (matchState.inning === 1) {
                    if (tossWinner === team1) {
                        battingTeam = (choice === 'BAT' ? team1 : team2);
                        bowlingTeam = (choice === 'BAT' ? team2 : team1);
                    } else {
                        battingTeam = (choice === 'BAT' ? team2 : team1);
                        bowlingTeam = (choice === 'BAT' ? team1 : team2);
                    }
                } else {
                    if (tossWinner === team1) {
                        battingTeam = (choice === 'BAT' ? team2 : team1);
                        bowlingTeam = (choice === 'BAT' ? team1 : team2);
                    } else {
                        battingTeam = (choice === 'BAT' ? team1 : team2);
                        bowlingTeam = (choice === 'BAT' ? team2 : team1);
                    }
                }

                const t1Key = (team1 || "").trim().toUpperCase();
                const t2Key = (team2 || "").trim().toUpperCase();

                return {
                    battingTeam, bowlingTeam,
                    battingTeamId: teamMap[t1Key] || teamMap[t2Key], // Fallback search if exact fails
                    battingTeamIdReal: teamMap[(battingTeam || "").trim().toUpperCase()],
                    bowlingTeamIdReal: teamMap[(bowlingTeam || "").trim().toUpperCase()]
                };
            }, [selectedMatch, matchState.tossWinner, matchState.tossChoice, matchState.inning, teamMap]);

            function retireBatter(num) {
                const b = num === 1 ? matchState.batsman1 : matchState.batsman2;
                if (!b.reg) return;
                if (!confirm(`Retire ${b.name}? They will be marked as RETIRED.`)) return;

                setMatchState(prev => {
                    let next = { ...prev };
                    const striker = num === 1 ? next.batsman1 : next.batsman2;
                    const bStat = next.battingStats[striker.reg];
                    if (bStat) {
                        bStat.out = false;
                        bStat.status = 'RETIRED';
                    }
                    setShowPlayerModal(num === 1 ? 's1' : 's2');
                    return next;
                });
            };

            function handleScore(val) {
                setMatchState(prev => {
                    try {
                        const newHistory = [...(prev.history || []), JSON.parse(JSON.stringify(prev))];
                        if (newHistory.length > 20) newHistory.shift();

                        let next = { ...prev, history: newHistory };
                        
                        // Safety check for missing arrays (from old saves)
                        if (!next.timeline) next.timeline = [];
                        if (!next.fow1) next.fow1 = [];
                        if (!next.fow2) next.fow2 = [];
                        if (!next.battingStats) next.battingStats = {};
                        if (!next.bowlingStats) next.bowlingStats = {};

                        const striker = next.striker === 1 ? next.batsman1 : next.batsman2;
                        if (!striker || !striker.reg) { 
                            debugLog(`⚠️ Missing ${next.striker === 1 ? 'Striker' : 'Non-Striker'} ID`, "#ff4d8d");
                            alert(`Missing info for ${next.striker === 1 ? 'Striker' : 'Non-Striker'}. Please click on their name and re-select from the list!`); 
                            return prev; 
                        }
                        if (!next.bowler || !next.bowler.reg) { 
                            debugLog("⚠️ Missing Bowler ID", "#ff4d8d");
                            alert("Missing Bowler info. Please click on Bowler name and re-select from the list!"); 
                            return prev; 
                        }

                        // Initialize tracker if missing
                        if (!next.battingStats[striker.reg]) next.battingStats[striker.reg] = { name: striker.name, runs: 0, balls: 0, f4s: 0, s6s: 0, out: false, inning: next.inning };
                        if (!next.bowlingStats[next.bowler.reg]) next.bowlingStats[next.bowler.reg] = { name: next.bowler.name, overs: 0, balls: 0, runs: 0, wickets: 0, inning: next.inning };

                        const bStat = next.battingStats[striker.reg];
                        const bowlStat = next.bowlingStats[next.bowler.reg];

                        if (val === 'W') {
                            // Record FOW before updating
                            const fowRecord = {
                                name: striker.name,
                                reg: striker.reg,
                                runs: striker.runs,
                                balls: striker.balls,
                                teamScore: next.runs,
                                teamWkts: next.wkts + 1,
                                overs: `${next.overs}.${next.balls}`
                            };

                            if (next.inning === 1) next.fow1 = [...next.fow1, fowRecord];
                            else next.fow2 = [...next.fow2, fowRecord];

                            next.wkts += 1;
                            next.bowler.wkts += 1;
                            bowlStat.wickets += 1;
                            striker.balls += 1;
                            bStat.balls += 1;
                            bStat.out = true;

                            // WICKET LIMIT CHECK
                            const effectiveWicketLimit = next.wicketLimit || 10;
                            if (next.wkts >= effectiveWicketLimit) {
                                alert(`Inning Ended! Wicket Limit of ${effectiveWicketLimit} reached.`);
                                if (next.inning === 1) {
                                    handleInningsBreak(next);
                                } else {
                                    alert("Match Completed! Please select the winner.");
                                }
                            } else {
                                setShowPlayerModal(next.striker === 1 ? 's1' : 's2');
                            }
                        } else if (val === 'WD' || val === 'NB') {
                            next.runs += 1;
                            next.bowler.runs += 1;
                            bowlStat.runs += 1;
                        } else if (val === 'B' || val === 'LB') {
                            next.runs += 1; // Standard 1 run for simple B/LB
                            striker.balls += 1;
                            bStat.balls += 1;
                        } else {
                            next.runs += val;
                            striker.runs += val;
                            striker.balls += 1;
                            next.bowler.runs += val;

                            bStat.runs += val;
                            bStat.balls += 1;
                            bowlStat.runs += val;

                            if (val === 4) { bStat.f4s = (bStat.f4s || 0) + 1; }
                            if (val === 6) { bStat.s6s = (bStat.s6s || 0) + 1; }

                            if (val % 2 !== 0) next.striker = next.striker === 1 ? 2 : 1;
                        }

                        if (val !== 'WD' && val !== 'NB') {
                            next.balls += 1;
                            next.bowler.balls += 1;
                            bowlStat.balls += 1;
                            if (bowlStat.balls >= 6) { bowlStat.overs += 1; bowlStat.balls = 0; }

                            if (next.balls >= 6) {
                                next.balls = 0;
                                next.overs += 1;
                                next.bowler.overs += 1;
                                next.bowler.balls = 0;

                                // OVER LIMIT CHECK
                                if (next.overLimit && next.overs >= next.overLimit) {
                                    alert(`Inning Ended! Over Limit of ${next.overLimit} reached.`);
                                    // Transition logic
                                    if (next.inning === 1) {
                                        handleInningsBreak(next);
                                    } else {
                                        // Match Result logic already exists in the header usually, or just notify
                                        alert("Match Completed! Please select the winner.");
                                    }
                                } else {
                                    next.striker = next.striker === 1 ? 2 : 1;
                                    setShowPlayerModal('bowl');
                                }
                            }
                        }

                        next.timeline = [...next.timeline, val].slice(-6);
                        syncToDB(next);
                        checkMatchResult(next); // NEW: Automate winner detection
                        return next;
                    } catch (err) {
                        console.error("handleScore Critical Error:", err);
                        alert("Action Failed: " + err.message);
                        return prev;
                    }
                });
            };

            function handleInningsBreak(state) {
                const target = state.runs + 1;
                state.inning = 2;
                state.target = target;
                state.runs = 0; state.wkts = 0; state.overs = 0; state.balls = 0; state.timeline = [];
                state.batsman1 = { name: 'Select Striker', runs: 0, balls: 0, reg: null };
                state.batsman2 = { name: 'Select Non-Striker', runs: 0, balls: 0, reg: null };
                state.bowler = { name: 'Select Bowler', runs: 0, wkts: 0, overs: 0, balls: 0, reg: null };
                alert(`Target set to ${target}. Select new players for 2nd Inning.`);
            };

            async function endMatch(winnerName, resultText) {
                if (!selectedMatch) return;
                try {
                    // 1. Update Fixture status and winner
                    const { error: fErr } = await supabaseClient.from('fixtures').update({
                        status: 'completed',
                        winner: winnerName
                    }).eq('id', selectedMatch.id);

                    // 2. Update Hero banner with the result
                    const { error: hErr } = await supabaseClient.from('hero_content').update({
                        badge: "MATCH OVER",
                        match_status: resultText
                    }).eq('id', '00000000-0000-0000-0000-000000000001');

                    if (!fErr && !hErr) {
                        debugLog("Match Completed: " + resultText, "#00ff88");
                        alert("Match Completed! Result: " + resultText);
                        setIsLive(false);
                        fetchFixtures();
                    }
                } catch (e) {
                    console.error("EndMatch Error:", e);
                }
            };

            function checkMatchResult(state) {
                if (state.inning !== 2 || !state.target) return;

                const teams = getInningTeams();
                const battingTeam = teams.battingTeam;
                const bowlingTeam = teams.bowlingTeam;

                // Case 1: Chasing team reaches target
                if (state.runs >= state.target) {
                    const wicketsLeft = (state.wicketLimit || 10) - state.wkts;
                    const result = `${battingTeam} won by ${wicketsLeft} wickets!`;
                    endMatch(battingTeam, result);
                    return;
                }

                // Case 2: Inning finished (Overs or Wickets)
                const isWktFinish = state.wkts >= (state.wicketLimit || 10);
                const isOverFinish = state.overLimit && state.overs >= state.overLimit;

                if (isWktFinish || isOverFinish) {
                    if (state.runs < state.target - 1) {
                        const runsMargin = (state.target - 1) - state.runs;
                        const result = `${bowlingTeam} won by ${runsMargin} runs!`;
                        endMatch(bowlingTeam, result);
                    } else if (state.runs === state.target - 1) {
                        const result = `Match Draw! Scores level.`;
                        endMatch('Draw', result);
                    }
                }
            };

            function undo() {
                if (matchState.history.length === 0) return;
                const last = matchState.history.pop();
                setMatchState(last);
                syncToDB(last);
            };

            async function syncToDB(state) {
                if (!selectedMatch) return;
                const is2nd = state.inning === 2;
                const currentOvers = parseFloat(`${state.overs}.${state.balls}`);

                // 1. Update Hero Content (Real-time Homepage)
                const heroUpdate = {
                    batsman1: state.batsman1.name, 
                    batsman1_runs: state.batsman1.runs, 
                    batsman1_balls: state.batsman1.balls,
                    batsman1_4s: state.battingStats[state.batsman1.reg]?.f4s || 0,
                    batsman1_6s: state.battingStats[state.batsman1.reg]?.s6s || 0,
                    batsman1_reg: state.batsman1.reg,

                    batsman2: state.batsman2.name, 
                    batsman2_runs: state.batsman2.runs, 
                    batsman2_balls: state.batsman2.balls,
                    batsman2_4s: state.battingStats[state.batsman2.reg]?.f4s || 0,
                    batsman2_6s: state.battingStats[state.batsman2.reg]?.s6s || 0,
                    batsman2_reg: state.batsman2.reg,

                    bowler_name: state.bowler.name, 
                    bowler_runs: state.bowler.runs, 
                    bowler_wickets: state.bowler.wkts,
                    bowler_overs: state.bowler.overs, 
                    bowler_over_balls: state.bowler.balls,
                    bowler_reg: state.bowler.reg,
                    
                    recent_balls: state.timeline.join(','), 
                    striker_idx: state.striker,
                    max_overs: state.overLimit,
                    team1_name: selectedMatch.team1,
                    team2_name: selectedMatch.team2,
                    match_status: state.tossWinner ?
                        `${state.tossWinner} won toss & chose to ${state.tossChoice}` :
                        (is2nd ? `${selectedMatch.team1} vs ${selectedMatch.team2} • Target: ${state.target}` : `${selectedMatch.team1} vs ${selectedMatch.team2}`),
                    badge: is2nd ? `TARGET: ${state.target}` : "LIVE MATCH"
                };
                if (is2nd) {
                    heroUpdate.team2_score = state.runs; heroUpdate.team2_wickets = state.wkts;
                    heroUpdate.team2_overs = state.overs; heroUpdate.team2_balls = state.balls;
                } else {
                    heroUpdate.team1_score = state.runs; heroUpdate.wickets = state.wkts;
                    heroUpdate.overs = state.overs; heroUpdate.balls = state.balls;
                }
                // 1. Update Hero Feed (Main Homepage & Real-time)
                const { error: hErr } = await supabaseClient.from('hero_content').update(heroUpdate).eq('id', '00000000-0000-0000-0000-000000000001');
                if (hErr) console.error("Sync Error (Hero):", hErr.message);

                // 2. Update Fixtures (Update both status and current match scores)
                const fixtureSync = {
                    status: 'live',
                    t1_score: is2nd ? (state.target - 1) : state.runs,
                    t1_wickets: is2nd ? (state.wicketLimit || 10) : state.wkts,
                    t2_score: is2nd ? state.runs : 0,
                    t2_wickets: is2nd ? state.wkts : 0
                };
                const { error: fErr } = await supabaseClient.from('fixtures').update(fixtureSync).eq('id', selectedMatch.id);
                if (fErr) console.error("Sync Error (Fixtures):", fErr.message);

                if (hErr || fErr) {
                    const msg = (hErr?.message || "") + " " + (fErr?.message || "");
                    if (msg.toLowerCase().includes("permission") || msg.toLowerCase().includes("row-level security")) {
                        console.error("CRITICAL: Database RLS is blocking the Scorer. Please run the SQL fix.");
                        debugLog("RLS BLOCKING: Run SQL Fix!", "#ff4b4b");
                    }
                }
                if (!hErr && !fErr) debugLog("Sync Successful ✅", "#00f2ff");

                // 3. Store Ball-by-Ball (via match_commentary to avoid 'match_balls' table missing error)
                try {
                    const lastBall = state.timeline[state.timeline.length - 1];
                    if (lastBall !== undefined) {
                        const striker = (state.striker === 1 ? state.batsman1 : state.batsman2);
                        const bowler = state.bowler;
                        const runs = typeof lastBall === 'number' ? lastBall : 0;
                        const extra = typeof lastBall === 'string' ? lastBall : '';
                        const strikerReg = state.striker === 1 ? state.batsman1.reg : state.batsman2.reg;
                        const dataTag = `[BALL_DATA:inn=${state.inning}|str=${strikerReg}|bow=${state.bowler.reg}|runs=${runs}|ext=${extra||''}]`;
                        let text = `${striker.name} ${extra === 'W' ? 'is OUT!' : (extra || runs + ' run(s)')}`;

                        const { error: commErr } = await supabaseClient.from('match_commentary').insert([{
                            match_id: selectedMatch.id,
                            commentary_text: `${dataTag} ${text}`,
                            ball_detail: `${state.overs}.${state.balls}`
                        }]);
                        if (commErr) console.warn("Commentary sync skipped (Table missing?):", commErr.message);
                    }
                } catch (e) {
                    console.warn("Exhaustive commentary catch (Non-blocking):", e.message);
                }
            };

            // --- DEBUGGER ---
            window.debugLog = (msg, color = '#00f2ff') => {
                const logDiv = document.createElement('div');
                logDiv.style = `position:fixed; bottom:20px; right:20px; background:rgba(0,0,0,0.9); color:${color}; padding:10px 15px; border-radius:12px; font-size:12px; z-index:9999; border:1px solid ${color}; font-weight:bold; box-shadow: 0 0 20px ${color}44;`;
                logDiv.innerText = "📡 " + msg;
                document.body.appendChild(logDiv);

            };

            async function resetMatch() {
                setShowResetConfirm(false); // Close the modal

                    debugLog("Resetting Match Data...", "#ffb300");

                    // 1. Reset Hero Content (Live Scoreboard Row) - CLEAR ALL DYNAMIC COLUMNS
                    const { error: heroErr } = await supabaseClient.from('hero_content').update({
                        badge: "SATPL 2026",
                        title: "SATPL 2026 • SEASON 1",
                        subtitle: "Waiting for the next match...",
                        match_status: "Match Reset",
                        team1_name: "TEAM A",
                        team2_name: "TEAM B",
                        team1_score: 0,
                        team2_score: 0,
                        wickets: 0,
                        overs: 0,
                        balls: 0,
                        target: null,
                        team2_wickets: 0,
                        team2_overs: 0,
                        team2_balls: 0,
                        batsman1: "Striker",
                        batsman1_runs: 0,
                        batsman1_balls: 0,
                        batsman1_4s: 0,
                        batsman1_6s: 0,
                        batsman1_reg: null,
                        batsman2: "Non-Striker",
                        batsman2_runs: 0,
                        batsman2_balls: 0,
                        batsman2_4s: 0,
                        batsman2_6s: 0,
                        batsman2_reg: null,
                        bowler_name: "Bowler",
                        bowler_runs: 0,
                        bowler_wickets: 0,
                        bowler_overs: 0,
                        bowler_over_balls: 0,
                        bowler_reg: null,
                        recent_balls: "",
                        striker_idx: 1,
                        max_overs: 6,
                        max_wickets: null
                    }).eq('id', '00000000-0000-0000-0000-000000000001');

                    if (heroErr) throw new Error("Hero Reset Failed: " + heroErr.message);

                    const { error: fixErr } = await supabaseClient.from('fixtures').update({
                        status: 'upcoming',
                        winner: null,
                        t1_score: 0, t1_wickets: 0,
                        t2_score: 0, t2_wickets: 0
                    }).eq('id', selectedMatch.id);

                    if (fixErr) throw new Error("Fixture Reset Failed: " + fixErr.message);

                    // 3. DELETE Historical Commentary (Optional/Resilient)
                    try {
                        await supabaseClient.from('match_commentary').delete().eq('match_id', selectedMatch.id);
                    } catch (e) { console.warn("Commentary delete skipped:", e); }

                    // 4. Reset Local State AFTER DB is cleared
                    setMatchState(DEFAULT_MATCH_STATE);

                    alert("Match reset successfully! All scores and history cleared.");
                    setIsLive(false); 
                    fetchFixtures();

                    console.error("Critical Reset Error:", err);
                    alert("Reset Failed: " + err.message);

                                    type="text"
                                    placeholder="Search by name or reg no..."
                                    className="bg-white/5 border border-white/10 p-4 rounded-xl mb-6 focus:outline-none focus:border-primary w-full text-sm"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    autoFocus
                                />
                                <div className="overflow-y-auto space-y-2 pr-2">
                                    {filteredPlayers.map(p => (
                                        <div
                                            key={p.reg_no}
                                            onClick={() => !p.status && selectPlayer(p)}
                                            className={`p-4 rounded-xl border border-white/5 transition-all flex justify-between items-center group ${p.status ? 'opacity-40 cursor-not-allowed grayscale' : 'hover:bg-primary hover:text-black hover:scale-[1.02] cursor-pointer'}`}
                                        >
                                            <div>
                                                <div className={`font-bold ${!p.status && 'group-hover:text-black'}`}>{p.player_name}</div>
                                                <div className={`text-[10px] opacity-60 font-mono uppercase ${!p.status && 'group-hover:text-black/60'}`}>{p.reg_no}</div>
                                            </div>
                                            <div className="text-right">
                                                {p.status ? (
                                                    <span className={`text-[10px] font-black px-2 py-1 rounded bg-white/10 ${p.status === 'OUT' ? 'text-secondary' : 'text-primary'}`}>{p.status}</span>
                                                ) : (
                                                    <div className="text-[10px] font-black opacity-0 group-hover:opacity-100 transition-opacity">CHOOSE</div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                    {filteredPlayers.length === 0 && (
                                        <div className="text-center py-10 text-gray-500 text-sm">No players found for this team.</div>
                                    )}
                                </div>
                                <Button onClick={() => setShowPlayerModal(null)} variant="danger" className="mt-6">Close</Button>
                            </div>
                        </div>
                    )}

                    {/* TOSS MODAL */}
                    {showTossModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
                            <div className="glass w-full max-w-md rounded-3xl p-8 text-center">
                                <h3 className="text-3xl font-black mb-2">TOSS SETUP</h3>
                                <p className="text-gray-400 text-sm mb-8">Enter the toss result to start scoring</p>

                                <div className="space-y-6 text-left">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-500 tracking-widest mb-2 block">Overs per Inning</label>
                                            <input
                                                type="number"
                                                value={matchState.overLimit || ''}
                                                onChange={(e) => setMatchState(p => ({ ...p, overLimit: parseInt(e.target.value) || 0 }))}
                                                className="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-primary text-sm font-bold"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-500 tracking-widest mb-2 block">Wicket Limit (Wkts)</label>
                                            <input
                                                type="number"
                                                placeholder="None (10)"
                                                value={matchState.wicketLimit || ''}
                                                onChange={(e) => setMatchState(p => ({ ...p, wicketLimit: parseInt(e.target.value) || null }))}
                                                className="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-primary text-sm font-bold"
                                            />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-gray-500 tracking-widest mb-2 block">Toss Winner</label>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={() => setMatchState(p => ({ ...p, tossWinner: selectedMatch.team1 }))} className={`p-4 rounded-xl border-2 font-bold transition-all ${matchState.tossWinner === selectedMatch.team1 ? 'border-primary bg-primary/10' : 'border-white/5 opacity-50'}`}>{selectedMatch.team1}</button>
                                            <button onClick={() => setMatchState(p => ({ ...p, tossWinner: selectedMatch.team2 }))} className={`p-4 rounded-xl border-2 font-bold transition-all ${matchState.tossWinner === selectedMatch.team2 ? 'border-primary bg-primary/10' : 'border-white/5 opacity-50'}`}>{selectedMatch.team2}</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-gray-500 tracking-widest mb-2 block">Decision</label>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={() => setMatchState(p => ({ ...p, tossChoice: 'BAT' }))} className={`p-4 rounded-xl border-2 font-bold transition-all ${matchState.tossChoice === 'BAT' ? 'border-primary bg-primary/10' : 'border-white/5 opacity-50'}`}>🏏 BAT FIRST</button>
                                            <button onClick={() => setMatchState(p => ({ ...p, tossChoice: 'BOWL' }))} className={`p-4 rounded-xl border-2 font-bold transition-all ${matchState.tossChoice === 'BOWL' ? 'border-primary bg-primary/10' : 'border-white/5 opacity-50'}`}>⚾ BOWL FIRST</button>
                                        </div>
                                    </div>
                                </div>

                                <Button
                                    disabled={!matchState.tossWinner || !matchState.tossChoice}
                                    onClick={startMatch}
                                    className="w-full mt-10 h-16"
                                >
                                    CONFIRM & START
                                </Button>
                            </div>
                        </div>
                    )}
                    {/* RESET CONFIRMATION MODAL */}
                    {showResetConfirm && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
                            <div className="glass w-full max-w-sm rounded-[32px] p-10 text-center border-red-500/20 shadow-2xl shadow-red-500/10">
                                <div className="h-20 w-20 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <span className="text-4xl">⚠️</span>
                                </div>
                                <h3 className="text-2xl font-black mb-4 text-white uppercase tracking-tighter">PERMANENT RESET?</h3>
                                <p className="text-gray-400 text-sm mb-10 leading-relaxed">
                                    This action will <span className="text-red-500 font-bold underline">permanently delete</span> all scores, wickets, and commentary for this match. This cannot be undone.
                                </p>
                                <div className="flex flex-col gap-3">
                                    <Button onClick={resetMatch} variant="danger" className="w-full h-14 rounded-2xl shadow-lg shadow-red-500/20">
                                        YES, RESET MATCH
                                    </Button>
                                    <button 
                                        onClick={() => setShowResetConfirm(false)} 
                                        className="w-full h-14 rounded-2xl font-bold text-gray-500 hover:text-white transition-all uppercase text-xs tracking-widest"
                                    >
                                        CANCEL
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* RESUME SCORING MODAL */}
                    {showResumeModal && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
                            <div className="glass w-full max-w-sm rounded-[32px] p-10 text-center border-primary/20 shadow-2xl shadow-primary/10">
                                <div className="h-20 w-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <span className="text-4xl">🔄</span>
                                </div>
                                <h3 className="text-2xl font-black mb-2 text-white uppercase tracking-tighter">RESUME SCORING?</h3>
                                <div className="text-[10px] text-primary font-black tracking-widest uppercase mb-6">{matchToResume?.team1} VS {matchToResume?.team2}</div>
                                
                                <p className="text-gray-400 text-sm mb-10 leading-relaxed">
                                    This match already has existing data. Would you like to continue where you left off or start a fresh match?
                                </p>
                                
                                <div className="flex flex-col gap-3">
                                    <Button onClick={handleResume} variant="primary" className="w-full h-14 rounded-2xl shadow-lg shadow-primary/20">
                                        2. CONTINUE WITH OLD DATA
                                    </Button>
                                    <Button onClick={handleStartFresh} variant="danger" className="w-full h-14 rounded-2xl border-red-500/50 bg-red-500/10 text-red-500 hover:bg-red-500/20">
                                        1. START NEW (CLEAN RESET)
                                    </Button>
                                    <button 
                                        onClick={() => setShowResumeModal(false)} 
                                        className="w-full h-12 mt-2 rounded-2xl font-bold text-gray-500 hover:text-white transition-all uppercase text-[10px] tracking-widest"
                                    >
                                        CANCEL
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* EXIT CONFIRMATION MODAL */}
                    {showExitConfirm && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
                            <div className="glass w-full max-w-sm rounded-[32px] p-10 text-center border-white/10 shadow-2xl">
                                <div className="h-20 w-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
                                    🚪
                                </div>
                                <h3 className="text-2xl font-black mb-4 text-white uppercase tracking-tighter">EXIT SCORING?</h3>
                                <p className="text-gray-400 text-sm mb-10 leading-relaxed">
                                    Are you sure you want to exit the scoring dashboard? Unsaved progress may be lost.
                                </p>
                                <div className="flex flex-col gap-3">
                                    <Button onClick={() => { setIsLive(false); setShowExitConfirm(false); }} variant="primary" className="w-full h-14 rounded-2xl text-black">
                                        YES, EXIT NOW
                                    </Button>
                                    <button 
                                        onClick={() => setShowExitConfirm(false)} 
                                        className="w-full h-14 rounded-2xl font-bold text-gray-500 hover:text-white transition-all uppercase text-xs tracking-widest"
                                    >
                                        STAY HERE
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Full Scorecard Modal */}
                    {showScorecardModal && (
                        <div className="fixed inset-0 bg-[#06090f]/95 backdrop-blur-xl z-[100] flex items-center justify-center p-2 md:p-4">
                            <div className="bg-[#0d1117] border border-white/10 w-full max-w-4xl max-h-[98vh] md:max-h-[90vh] rounded-2xl md:rounded-3xl overflow-hidden flex flex-col shadow-2xl">
                                <div className="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
                                    <div>
                                        <h2 className="text-xl font-black tracking-tighter text-white">COMPREHENSIVE SCORECARD</h2>
                                        <div className="text-[10px] text-primary font-black tracking-widest uppercase">{selectedMatch.team1} VS {selectedMatch.team2}</div>
                                    </div>
                                    <button onClick={() => setShowScorecardModal(false)} className="h-10 w-10 rounded-xl bg-white/10 flex items-center justify-center hover:bg-red-500/20 hover:text-red-500 transition-all">✕</button>
                                </div>

                                <div className="flex-1 overflow-y-auto p-6 space-y-8">
                                    {[1, 2].map(inn => {
                                        const isCurrent = matchState.inning === inn;
                                        const tWinner = matchState.tossWinner;
                                        const tChoice = matchState.tossChoice;
                                        const team1 = selectedMatch.team1;
                                        const team2 = selectedMatch.team2;

                                        let bTeamName, bTeamId;
                                        if (inn === 1) {
                                            bTeamName = (tWinner === team1) ? (tChoice === 'BAT' ? team1 : team2) : (tChoice === 'BAT' ? team2 : team1);
                                        } else {
                                            bTeamName = (tWinner === team1) ? (tChoice === 'BAT' ? team2 : team1) : (tChoice === 'BAT' ? team1 : team2);
                                        }
                                        bTeamId = teamMap[bTeamName];

                                        const bStats = Object.values(matchState.battingStats).filter(s => s.inning === inn);
                                        const bowlStats = Object.values(matchState.bowlingStats).filter(s => s.inning === inn);

                                        if (bStats.length === 0 && bowlStats.length === 0 && !isCurrent) return null;

                                        return (
                                            <div key={inn} className="space-y-4">
                                                <div className="flex justify-between items-end border-b border-white/5 pb-2">
                                                    <h3 className="text-lg font-black text-primary italic uppercase">{inn === 1 ? '1st Inning' : '2nd Inning'} - {bTeamName}</h3>
                                                    {isCurrent && <span className="text-[10px] bg-primary/20 text-primary px-2 py-0.5 rounded font-black">CURRENT</span>}
                                                </div>

                                                {/* Batting Table */}
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left text-xs">
                                                        <thead>
                                                            <tr className="text-gray-500 uppercase font-black text-[10px] border-b border-white/10">
                                                                <th className="pb-2">Batter</th>
                                                                <th className="pb-2 text-center">R</th>
                                                                <th className="pb-2 text-center">B</th>
                                                                <th className="pb-2 text-center">4s</th>
                                                                <th className="pb-2 text-center">6s</th>
                                                                <th className="pb-2 text-center">SR</th>
                                                                <th className="pb-2 text-right">Status</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-white/5">
                                                            {bStats.map(s => (
                                                                <tr key={s.reg || s.name} className="group hover:bg-white/5 transition-all">
                                                                    <td className="py-3 font-bold text-gray-300">{s.name}</td>
                                                                    <td className="py-3 text-center font-black text-white">{s.runs}</td>
                                                                    <td className="py-3 text-center text-gray-500">{s.balls}</td>
                                                                    <td className="py-3 text-center text-gray-500">{s.f4s}</td>
                                                                    <td className="py-3 text-center text-gray-500">{s.s6s}</td>
                                                                    <td className="py-3 text-center text-primary font-bold">{s.balls > 0 ? ((s.runs / s.balls) * 100).toFixed(1) : '0.0'}</td>
                                                                    <td className="py-3 text-right">
                                                                        <span className={`px-2 py-0.5 rounded text-[9px] font-black ${s.out ? 'bg-secondary/10 text-secondary' : 'bg-primary/10 text-primary'}`}>
                                                                            {s.out ? 'OUT' : (isCurrent && (matchState.batsman1.reg === s.reg || matchState.batsman2.reg === s.reg) ? 'BATTING' : 'NOT OUT')}
                                                                        </span>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>

                                                {/* Bowling Table */}
                                                <div className="overflow-x-auto mt-6">
                                                    <table className="w-full text-left text-xs">
                                                        <thead>
                                                            <tr className="text-gray-500 uppercase font-black text-[10px] border-b border-white/10">
                                                                <th className="pb-2">Bowler</th>
                                                                <th className="pb-2 text-center">O</th>
                                                                <th className="pb-2 text-center">R</th>
                                                                <th className="pb-2 text-center">W</th>
                                                                <th className="pb-2 text-center">ER</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-white/5">
                                                            {bowlStats.map(s => (
                                                                <tr key={s.reg || s.name} className="group hover:bg-white/5 transition-all">
                                                                    <td className="py-3 font-bold text-gray-300">{s.name}</td>
                                                                    <td className="py-3 text-center font-black text-white">{s.overs}.{s.balls}</td>
                                                                    <td className="py-3 text-center text-gray-500">{s.runs}</td>
                                                                    <td className="py-3 text-center text-secondary font-black">{s.wickets}</td>
                                                                    <td className="py-3 text-center text-primary font-bold">
                                                                        {((s.overs * 6 + s.balls) > 0) ? (s.runs / ((s.overs * 6 + s.balls) / 6)).toFixed(2) : '0.00'}
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>

                                                {/* DNB Section */}
                                                <div className="mt-4 p-4 rounded-2xl bg-white/5 border border-white/5">
                                                    <div className="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">Did Not Bat (DNB)</div>
                                                    <div className="flex flex-wrap gap-2">
                                                        {teamPlayers
                                                            .filter(p => p.team_id === bTeamId)
                                                            .filter(p => !matchState.battingStats[p.reg_no] || (matchState.battingStats[p.reg_no] && matchState.battingStats[p.reg_no].inning !== inn))
                                                            .map(p => (
                                                                <span key={p.reg_no} className="text-[11px] text-gray-400 bg-white/5 px-2 py-1 rounded-lg border border-white/5">{p.player_name}</span>
                                                            ))
                                                        }
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
